<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Unwrap alphaETH</title>
  <meta name="description" content="One-button alphaETH/cyWETH unwrapper." />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <main class="wrap">
    <section class="panel">
      <p class="eyebrow">Ethereum Mainnet</p>
      <h1>Unwrap 100%</h1>
      <p class="sub">Connect MetaMask and unwrap all alpha-ETH / cyWETH / WETH the wallet can redeem.</p>

      <button id="mainBtn" class="big-red">Connect wallet</button>

      <div id="status" class="status">Wallet not connected.</div>
      <div id="balances" class="balances hidden"></div>
      <div id="message" class="message hidden"></div>

      <a id="donateBtn" class="donate hidden" href="https://www.votejoe.org/crypto" target="_blank" rel="noopener">Donate crypto to Joe</a>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/web3modal@1.9.12/dist/index.js"></script>
  <script src="./app.js"></script>
</body>
</html>
